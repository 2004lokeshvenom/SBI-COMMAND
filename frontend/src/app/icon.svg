<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Deep Dark Background -->
  <rect width="256" height="256" rx="55" fill="#050505"/>
  
  <!-- Outer Glow Ring -->
  <circle cx="128" cy="128" r="95" stroke="url(#orange-glow)" stroke-width="8" stroke-dasharray="14 10" opacity="0.8" />
  <circle cx="128" cy="128" r="95" stroke="#ea580c" stroke-width="3" filter="url(#glow-filter)" opacity="0.6" />

  <!-- Inner Ascension Star / Diamond -->
  <path d="M128 35 L155 105 L225 128 L155 151 L128 221 L101 151 L31 128 L101 105 Z" fill="url(#flame-grad)" filter="url(#glow-filter)" />
  <path d="M128 35 L155 105 L225 128 L155 151 L128 221 L101 151 L31 128 L101 105 Z" fill="white" fill-opacity="0.2" stroke="#fff" stroke-width="3" stroke-linejoin="round" />

  <!-- Core Brightness -->
  <circle cx="128" cy="128" r="30" fill="url(#core-grad)" filter="url(#glow-filter)" />

  <defs>
    <linearGradient id="orange-glow" x1="0" y1="0" x2="256" y2="256">
      <stop stop-color="#f97316" />
      <stop offset="0.5" stop-color="#ea580c" />
      <stop offset="1" stop-color="#fcd34d" />
    </linearGradient>
    
    <linearGradient id="flame-grad" x1="128" y1="35" x2="128" y2="221">
      <stop stop-color="#fb923c" />
      <stop offset="0.5" stop-color="#ea580c" />
      <stop offset="1" stop-color="#9a3412" />
    </linearGradient>

    <radialGradient id="core-grad" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#fef08a" />
      <stop offset="1" stop-color="#ea580c" stop-opacity="0" />
    </radialGradient>

    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
